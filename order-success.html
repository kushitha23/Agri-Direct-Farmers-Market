<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Order Success | Agri-Direct</title>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .success-container{

            background:white;
            width:100%;
            max-width:700px;
            padding:50px;
            border-radius:32px;
            text-align:center;
            box-shadow:0 8px 24px rgba(0,0,0,0.08);
        }

        /* ICON */

        .success-icon{

            width:120px;
            height:120px;
            background:#22c55e;
            color:white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            font-size:55px;
            margin-bottom:30px;
            animation:pop 0.6s ease;
        }

        @keyframes pop{

            0%{
                transform:scale(0);
            }

            100%{
                transform:scale(1);
            }
        }
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    padding:40px 8%;
}

a{
    text-decoration:none;
    color:inherit;
}

/* HEADER */

.history-header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.history-header h1{

    font-size:42px;
    color:#0f172a;
}

.home-btn{

    padding:14px 24px;
    border:none;
    border-radius:14px;
    background:#22c55e;
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.home-btn:hover{

    background:#16a34a;
}

/* ORDERS */

.orders{

    display:flex;
    flex-direction:column;
    gap:30px;
}

.order-card{

    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 6px 18px rgba(0,0,0,0.05);
    transition:0.3s;
}

.order-card:hover{

    transform:translateY(-5px);
}

/* TOP ROW */

.top-row{

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:25px;
}

.order-id{

    font-size:24px;
    font-weight:700;
    color:#0f172a;
}

.status{

    padding:10px 18px;
    border-radius:30px;
    font-size:14px;
    font-weight:700;
}

/* STATUS COLORS */

.delivered{

    background:#dcfce7;
    color:#15803d;
}

.pending{

    background:#fef3c7;
    color:#b45309;
}

.cancelled{

    background:#fee2e2;
    color:#dc2626;
}

.shipped{

    background:#dbeafe;
    color:#2563eb;
}

/* DETAILS */

.details-grid{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
    margin-bottom:30px;
}

.detail-box{

    background:#f8fafc;
    padding:20px;
    border-radius:20px;
}

.detail-box h3{

    margin-bottom:10px;
    color:#0f172a;
    font-size:18px;
}

.detail-box p{

    color:#64748b;
    line-height:28px;
    font-size:15px;
}

/* BUTTONS */

.button-group{

    display:flex;
    gap:16px;
    flex-wrap:wrap;
}

.btn{

    padding:14px 24px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.track-btn{

    background:#22c55e;
    color:white;
}

.track-btn:hover{

    background:#16a34a;
}

.reorder-btn{

    background:#0f172a;
    color:white;
}

.reorder-btn:hover{

    background:#1e293b;
}

/* MOBILE */

@media(max-width:800px){

    .details-grid{

        grid-template-columns:1fr;
    }

    .history-header{

        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .top-row{

        flex-direction:column;
        align-items:flex-start;
    }

    .button-group{

        flex-direction:column;
    }

    .btn{

        width:100%;
    }
}
        h1{

            font-size:42px;
            color:#0f172a;
            margin-bottom:16px;
        }

        .message{

            color:#64748b;
            font-size:18px;
            line-height:32px;
            margin-bottom:30px;
        }

        /* ORDER BOX */

        .order-box{

            background:#f8fafc;
            padding:30px;
            border-radius:24px;
            text-align:left;
            margin-top:30px;
            margin-bottom:35px;
        }

        .order-box h2{

            color:#16a34a;
            margin-bottom:25px;
            font-size:28px;
            text-align:center;
        }

        .detail-row{

            display:flex;
            justify-content:space-between;
            margin-bottom:18px;
            font-size:17px;
            border-bottom:1px solid #e2e8f0;
            padding-bottom:12px;
        }

        .detail-row strong{

            color:#0f172a;
        }

        .detail-row span{

            color:#475569;
        }

        /* BUTTONS */

        .button-group{

            display:flex;
            justify-content:center;
            gap:18px;
            flex-wrap:wrap;
        }

        .btn{

            padding:16px 28px;
            border:none;
            border-radius:16px;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .shop-btn{

            background:#22c55e;
            color:white;
        }

        .shop-btn:hover{

            background:#16a34a;
        }

        .track-btn{

            background:#0f172a;
            color:white;
        }

        .track-btn:hover{

            background:#1e293b;
        }

        /* MOBILE */

        @media(max-width:600px){

            .success-container{

                padding:35px 25px;
            }

            h1{

                font-size:34px;
            }

            .detail-row{

                flex-direction:column;
                gap:8px;
            }
        }

    </style>

</head>

<body>

    <!-- SUCCESS CARD -->

    <div class="success-container">

        <!-- ICON -->

        <div class="success-icon">

            <i class="fa-solid fa-check"></i>

        </div>

        <!-- TITLE -->

        <h1>Order Placed Successfully 🎉</h1>

        <p class="message">

            Thank you for shopping with Agri-Direct.
            Your fresh farm products are being prepared.

        </p>

        <!-- ORDER DETAILS -->

        <div class="order-box">

            <h2>Order Details</h2>

            <div class="detail-row">

                <strong>Customer Name</strong>

                <span id="customerName"></span>

            </div>

            <div class="detail-row">

                <strong>Phone Number</strong>

                <span id="customerPhone"></span>

            </div>

            <div class="detail-row">

                <strong>Email Address</strong>

                <span id="customerEmail"></span>

            </div>

            <div class="detail-row">

                <strong>Delivery Address</strong>

                <span id="customerAddress"></span>

            </div>

            <div class="detail-row">

                <strong>City</strong>

                <span id="customerCity"></span>

            </div>

            <div class="detail-row">

                <strong>Pincode</strong>

                <span id="customerPincode"></span>

            </div>

            <div class="detail-row">

                <strong>Payment Method</strong>

                <span id="customerPayment"></span>

            </div>

            <div class="detail-row">

                <strong>Estimated Delivery</strong>

                <span>Tomorrow, 10:00 AM - 2:00 PM</span>

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="button-group">

            <a href="products.html">

                <button class="btn shop-btn">

                    Continue Shopping

                </button>

            </a>

            <a href="order-tracking.html">

                <button class="btn track-btn">

                    Track Order

                </button>

            </a>
            

    
<a href="order-history.html">

    <button class="btn reorder-btn">

        View Order History

    </button>

</a>
</a>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

    let customer =
    JSON.parse(localStorage.getItem("customer"));

    document.getElementById("customerName")
    .innerText = customer.name;

    document.getElementById("customerPhone")
    .innerText = customer.phone;

    document.getElementById("customerEmail")
    .innerText = customer.email;

    document.getElementById("customerAddress")
    .innerText = customer.address;

    document.getElementById("customerCity")
    .innerText = customer.city;

    document.getElementById("customerPincode")
    .innerText = customer.pincode;

    document.getElementById("customerPayment")
    .innerText = customer.payment;

    </script>

</body>

</html>
