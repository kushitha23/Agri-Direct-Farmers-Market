<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Farmer Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f3f7ff;
    padding:30px 7%;
}

a{
    text-decoration:none;
}

/* TOPBAR */

.topbar{

    background:white;
    padding:20px 30px;
    border-radius:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:30px;

    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.topbar h1{
    color:#0f172a;
}

.top-buttons{
    display:flex;
    gap:15px;
}

.top-btn{

    border:none;
    padding:12px 22px;
    border-radius:12px;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.notify-btn{
    background:#22c55e;
}

.logout-btn{
    background:#ef4444;
}

/* STATS */

.stats{

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;

    margin-bottom:30px;
}

.stat-card{

    background:white;
    padding:25px;
    border-radius:20px;

    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.stat-card i{

    font-size:30px;
    color:#22c55e;

    margin-bottom:15px;
}

.stat-card h2{

    font-size:30px;
    margin-bottom:8px;

    color:#0f172a;
}

.stat-card p{
    color:#64748b;
}

/* ACTIONS */

.actions{

    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-bottom:30px;
}

.action-card{

    background:white;
    padding:30px;
    border-radius:20px;

    text-align:center;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.action-card:hover{
    transform:translateY(-5px);
}

.action-card i{

    font-size:40px;
    color:#22c55e;

    margin-bottom:15px;
}

.action-card h3{

    color:#0f172a;
    margin-bottom:10px;
}

.action-card p{

    color:#64748b;
    font-size:14px;
}

/* PRODUCTS */

.products-box{

    background:white;
    padding:30px;
    border-radius:20px;

    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.products-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:20px;
}

.products-header input{

    padding:12px 16px;
    border:none;
    background:#f1f5f9;
    border-radius:12px;
    outline:none;
    width:250px;
}

table{

    width:100%;
    border-collapse:collapse;
}

th{

    background:#f8fafc;
    padding:16px;
    text-align:left;
}

td{

    padding:16px;
    border-bottom:1px solid #e2e8f0;
}

td img{

    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:12px;
}

/* BUTTONS */

.edit-btn,
.delete-btn{

    border:none;
    padding:10px 16px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.edit-btn{
    background:#3b82f6;
}

.delete-btn{
    background:#ef4444;
}

/* MOBILE */

@media(max-width:1000px){

    .stats{
        grid-template-columns:repeat(2,1fr);
    }

    .actions{
        grid-template-columns:1fr;
    }
}

@media(max-width:700px){

    .stats{
        grid-template-columns:1fr;
    }

    .topbar{

        flex-direction:column;
        align-items:flex-start;

        gap:20px;
    }

    .products-header{

        flex-direction:column;
        align-items:flex-start;

        gap:15px;
    }

    table{
        display:block;
        overflow-x:auto;
    }
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <h1>🌾 Farmer Dashboard</h1>

    <div class="top-buttons">

        <button class="top-btn notify-btn"
        onclick="showNotifications()">

            Notifications

        </button>

        <button class="top-btn logout-btn"
        onclick="logoutUser()">

            Logout

        </button>

    </div>

</div>

<!-- STATS -->

<div class="stats">

    <div class="stat-card">

        <i class="fa-solid fa-box"></i>

        <h2 id="totalProducts">0</h2>

        <p>Total Products</p>

    </div>

    <div class="stat-card">

        <i class="fa-solid fa-cart-shopping"></i>

        <h2>120</h2>

        <p>Total Orders</p>

    </div>

    <div class="stat-card">

        <i class="fa-solid fa-indian-rupee-sign"></i>

        <h2>₹52K</h2>

        <p>Total Revenue</p>

    </div>

    <div class="stat-card">

        <i class="fa-solid fa-truck"></i>

        <h2>15</h2>

        <p>Pending Deliveries</p>

    </div>

</div>

<!-- ACTIONS -->

<div class="actions">

    <div class="action-card"
    onclick="window.location.href='add-product.html'">

        <i class="fa-solid fa-plus"></i>

        <h3>Add Product</h3>

        <p>Add new products to marketplace</p>

    </div>

    <div class="action-card"
    onclick="window.location.href='manage-products.html'">

        <i class="fa-solid fa-pen"></i>

        <h3>Manage Products</h3>

        <p>Edit and manage all products</p>

    </div>

    <div class="action-card"
    onclick="window.location.href='farmer-orders.html'">

        <i class="fa-solid fa-box"></i>

        <h3>View Orders</h3>

        <p>Track customer orders</p>

    </div>

</div>

<!-- PRODUCTS -->

<div class="products-box">

    <div class="products-header">

        <h2>My Products</h2>

        <input type="text"
        id="searchInput"
        placeholder="Search products..."
        onkeyup="searchProducts()">

    </div>

    <table>

        <thead>

            <tr>

                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Edit</th>
                <th>Delete</th>

            </tr>

        </thead>

        <tbody id="productTableBody">

        </tbody>

    </table>

</div>

<!-- SCRIPT -->

<script>

let products =
JSON.parse(
localStorage.getItem("farmerProducts")
) || [];

let tableBody =
document.getElementById(
"productTableBody"
);

function loadProducts(){

    tableBody.innerHTML = "";

    document.getElementById(
    "totalProducts"
    ).innerText = products.length;

    products.forEach((product,index)=>{

        tableBody.innerHTML += `

        <tr>

            <td>

                <img src="${product.image}">

            </td>

            <td>${product.name}</td>

            <td>${product.category}</td>

            <td>₹${product.price}</td>

            <td>${product.stock}</td>

            <td>

                <button class="edit-btn"
                onclick="editProduct(${index})">

                    Edit

                </button>

            </td>

            <td>

                <button class="delete-btn"
                onclick="deleteProduct(${index})">

                    Delete

                </button>

            </td>

        </tr>

        `;
    });
}

function editProduct(index){

    let newName =
    prompt(
    "Edit Product Name",
    products[index].name
    );

    if(newName){

        products[index].name =
        newName;

        localStorage.setItem(
        "farmerProducts",
        JSON.stringify(products)
        );

        loadProducts();
    }
}

function deleteProduct(index){

    let confirmDelete =
    confirm(
    "Delete this product?"
    );

    if(confirmDelete){

        products.splice(index,1);

        localStorage.setItem(
        "farmerProducts",
        JSON.stringify(products)
        );

        loadProducts();
    }
}

function searchProducts(){

    let input =
    document.getElementById(
    "searchInput"
    ).value.toLowerCase();

    let rows =
    document.querySelectorAll(
    "#productTableBody tr"
    );

    rows.forEach(row=>{

        let product =
        row.children[1]
        .innerText
        .toLowerCase();

        if(product.includes(input)){

            row.style.display = "";
        }

        else{

            row.style.display = "none";
        }
    });
}

function showNotifications(){

    alert(
    "📦 5 New Orders\n🚚 15 Pending Deliveries"
    );
}

function logoutUser(){

    let confirmLogout =
    confirm(
    "Are you sure you want to logout?"
    );

    if(confirmLogout){

        window.location.href =
        "login.html";
    }
}

loadProducts();

</script>

</body>

</html>
