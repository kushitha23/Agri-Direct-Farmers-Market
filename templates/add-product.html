<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Add Product | Agri-Direct</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#eef4ff;
            padding:35px 8%;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        /* TOPBAR */

        .topbar{

            background:white;
            padding:22px 30px;
            border-radius:24px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:35px;
            box-shadow:0 8px 20px rgba(0,0,0,0.05);
        }

        .topbar h1{

            font-size:38px;
            color:#0f172a;
        }

        .back-btn{

            border:none;
            padding:14px 22px;
            border-radius:14px;
            background:#22c55e;
            color:white;
            font-weight:700;
            cursor:pointer;
        }

        /* FORM */

        .form-box{

            background:white;
            padding:40px;
            border-radius:30px;
            box-shadow:0 8px 20px rgba(0,0,0,0.05);
        }

        .form-title{

            margin-bottom:30px;
        }

        .form-title h2{

            font-size:34px;
            color:#0f172a;
            margin-bottom:10px;
        }

        .form-title p{

            color:#64748b;
        }

        .form-grid{

            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:25px;
        }

        .form-group{

            display:flex;
            flex-direction:column;
        }

        .form-group label{

            margin-bottom:10px;
            font-weight:600;
            color:#0f172a;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{

            padding:16px;
            border:none;
            background:#f1f5f9;
            border-radius:16px;
            outline:none;
            font-size:15px;
        }

        textarea{

            resize:none;
            height:140px;
        }

        .full-width{

            grid-column:1/3;
        }

        /* IMAGE UPLOAD */

        .image-upload{

            border:2px dashed #cbd5e1;
            border-radius:20px;
            padding:40px;
            text-align:center;
            background:#f8fafc;
            cursor:pointer;
        }

        .image-upload i{

            font-size:48px;
            color:#22c55e;
            margin-bottom:15px;
        }

        .image-upload p{

            color:#64748b;
        }

        /* BUTTONS */

        .button-group{

            display:flex;
            gap:20px;
            margin-top:35px;
            flex-wrap:wrap;
        }

        .btn{

            border:none;
            padding:16px 28px;
            border-radius:16px;
            color:white;
            font-weight:700;
            cursor:pointer;
            font-size:15px;
        }

        .save-btn{

            background:#22c55e;
        }

        .reset-btn{

            background:#ef4444;
        }

        /* MOBILE */

        @media(max-width:850px){

            .form-grid{

                grid-template-columns:1fr;
            }

            .full-width{

                grid-column:auto;
            }

            .topbar{

                flex-direction:column;
                gap:20px;
                align-items:flex-start;
            }
        }

    </style>

</head>

<body>

    <!-- TOPBAR -->

    <div class="topbar">

        <h1>➕ Add Product</h1>

        <a href="farmer-dashboard.html">

            <button class="back-btn">

                Back Dashboard

            </button>

        </a>

    </div>

    <!-- FORM -->

    <div class="form-box">

        <div class="form-title">

            <h2>Add New Product 🌾</h2>

            <p>
                Fill all details to add products to marketplace.
            </p>

        </div>

        <div class="form-grid">

            <!-- PRODUCT NAME -->

            <div class="form-group">

                <label>Product Name</label>

                <input type="text"
                id="productName"
                placeholder="Enter product name">

            </div>

            <!-- CATEGORY -->

            <div class="form-group">

                <label>Category</label>

                <select id="productCategory">

                    <option>Vegetables</option>
                    <option>Fruits</option>
                    <option>Dairy</option>
                    <option>Organic</option>
                    <option>Grains</option>

                </select>

            </div>

            <!-- PRICE -->

            <div class="form-group">

                <label>Price</label>

                <input type="text"
                id="productPrice"
                placeholder="₹ Price">

            </div>

            <!-- STOCK -->

            <div class="form-group">

                <label>Stock Quantity</label>

                <input type="text"
                id="productStock"
                placeholder="Available stock">

            </div>

            <!-- IMAGE -->

            <div class="form-group full-width">

                <label>Upload Product Image</label>

                <div class="image-upload"
                onclick="document.getElementById('imageInput').click()">

                    <i class="fa-solid fa-cloud-arrow-up"></i>

                    <p>
                        Click here to upload product image
                    </p>

                    <input type="file"
                    id="imageInput"
                    hidden
                    onchange="previewImage(event)">

                </div>

            </div>

            <!-- DESCRIPTION -->

            <div class="form-group full-width">

                <label>Description</label>

                <textarea
                id="productDescription"
                placeholder="Write product details..."></textarea>

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="button-group">

            <button class="btn save-btn"
            onclick="saveProduct()">

                Save Product

            </button>

            <button class="btn reset-btn"
            onclick="resetForm()">

                Reset

            </button>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

    let uploadedImage = "";

    function previewImage(event){

        let file =
        event.target.files[0];

        if(file){

            uploadedImage =
            URL.createObjectURL(file);
        }
    }

    function saveProduct(){

        let name =
        document.getElementById("productName").value;

        let category =
        document.getElementById("productCategory").value;

        let price =
        document.getElementById("productPrice").value;

        let stock =
        document.getElementById("productStock").value;

        let description =
        document.getElementById("productDescription").value;

        if(
            name === "" ||
            price === "" ||
            stock === ""
        ){

            alert(
            "Please fill all required fields!"
            );

            return;
        }

        let product = {

            image: uploadedImage,

            name: name,

            category: category,

            price: price,

            stock: stock,

            description: description
        };

        let products =
        JSON.parse(
        localStorage.getItem("farmerProducts")
        ) || [];

        products.push(product);

        localStorage.setItem(
            "farmerProducts",
            JSON.stringify(products)
        );

        alert(
        "✅ Product Added Successfully!"
        );

        window.location.href =
        "farmer-dashboard.html";
    }

    function resetForm(){

        document.getElementById("productName").value = "";
        document.getElementById("productPrice").value = "";
        document.getElementById("productStock").value = "";
        document.getElementById("productDescription").value = "";
    }

    </script>

</body>

</html>
