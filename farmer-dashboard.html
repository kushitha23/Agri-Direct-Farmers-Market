<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Farmer Dashboard | Agri-Direct</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Sora',sans-serif;
        }

        body{
            background:#f5f7fb;
            color:#081224;
        }

        nav{

            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 8%;
            background:white;
            box-shadow:0 4px 10px rgba(0,0,0,0.05);
        }

        .logo{

            font-size:22px;
            font-weight:800;
            color:#05a834;
        }

        .dashboard{

            width:85%;
            margin:40px auto;
        }

        .dashboard h1{

            font-size:40px;
            margin-bottom:10px;
        }

        .dashboard p{

            color:#64748b;
            margin-bottom:30px;
        }

        /* STATS */

        .stats{

            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:40px;
        }

        .stat-card{

            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 5px 14px rgba(0,0,0,0.05);
        }

        .stat-card h2{

            font-size:18px;
            margin-bottom:12px;
        }

        .stat-card .number{

            font-size:34px;
            font-weight:800;
            color:#05a834;
        }

        /* PRODUCTS */

        .products{

            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 5px 14px rgba(0,0,0,0.05);
        }

        .products-top{

            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .add-btn{

            padding:12px 18px;
            border:none;
            border-radius:12px;
            background:#05a834;
            color:white;
            font-weight:700;
            cursor:pointer;
        }

        table{

            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{

            padding:16px;
            text-align:left;
            border-bottom:1px solid #e2e8f0;
        }

        table th{

            background:#f8fafc;
        }

        .edit-btn{

            padding:8px 14px;
            border:none;
            border-radius:10px;
            background:#3b82f6;
            color:white;
            cursor:pointer;
            margin-right:10px;
        }

        .delete-btn{

            padding:8px 14px;
            border:none;
            border-radius:10px;
            background:#ef4444;
            color:white;
            cursor:pointer;
        }

        footer{

            background:#07152d;
            color:white;
            padding:45px 8% 20px;
            margin-top:60px;
        }

        .copyright{

            text-align:center;
            color:#94a3b8;
            font-size:12px;
        }

        @media(max-width:900px){

            table{
                font-size:12px;
            }

            .products-top{
                flex-direction:column;
                gap:15px;
                align-items:flex-start;
            }
        }

    </style>

</head>

<body>

    <nav>

        <div class="logo">

            <i class="fa-solid fa-seedling"></i>

            Agri-Direct

        </div>

    </nav>

    <section class="dashboard">

        <h1>
            Farmer Dashboard
        </h1>

        <p>
            Manage your products and track sales
        </p>

        <!-- STATS -->

        <div class="stats">

            <div class="stat-card">

                <h2>Total Earnings</h2>

                <div class="number">₹18,500</div>

            </div>

            <div class="stat-card">

                <h2>Products Listed</h2>

                <div class="number">8</div>

            </div>

            <div class="stat-card">

                <h2>Orders Received</h2>

                <div class="number">25</div>

            </div>

        </div>

        <!-- PRODUCTS -->

        <div class="products">

            <div class="products-top">

                <h2>
                    Your Products
                </h2>

                <button class="add-btn">

                    Add Product

                </button>

            </div>

            <table>

                <tr>

                    <th>Product</th>

                    <th>Price</th>

                    <th>Quantity</th>

                    <th>Actions</th>

                </tr>

                <tr>

                    <td>Organic Tomatoes</td>

                    <td>₹40/kg</td>

                    <td>120kg</td>

                    <td>

                        <button class="edit-btn">

                            Edit

                        </button>

                        <button class="delete-btn">

                            Delete

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>Sweet Mangoes</td>

                    <td>₹120/dozen</td>

                    <td>80 Dozen</td>

                    <td>

                        <button class="edit-btn">

                            Edit

                        </button>

                        <button class="delete-btn">

                            Delete

                        </button>

                    </td>

                </tr>

            </table>

        </div>

    </section>

    <footer>

        <div class="copyright">

            © 2026 Agri-Direct | Developed by Kushitha & Pradeep

        </div>

    </footer>

</body>

</html>
