<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Checkout | Agri-Direct</title>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fb;
            padding:40px 8%;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        /* HEADER */

        .checkout-header{

            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:40px;
        }

        .checkout-header h1{

            font-size:42px;
            color:#0f172a;
        }

        .back-btn{

            padding:14px 24px;
            border:none;
            border-radius:14px;
            background:#22c55e;
            color:white;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
        }

        /* LAYOUT */

        .checkout-layout{

            display:grid;
            grid-template-columns:2fr 1fr;
            gap:30px;
        }

        /* FORM */

        .checkout-form{

            background:white;
            padding:35px;
            border-radius:28px;
            box-shadow:0 6px 18px rgba(0,0,0,0.05);
        }

        .checkout-form h2{

            margin-bottom:28px;
            font-size:30px;
            color:#0f172a;
        }

        .form-group{

            margin-bottom:22px;
        }

        .form-group label{

            display:block;
            margin-bottom:10px;
            font-size:15px;
            font-weight:600;
            color:#334155;
        }

        .form-group input,
        .form-group textarea{

            width:100%;
            padding:16px;
            border:1px solid #dbe4ee;
            border-radius:14px;
            outline:none;
            font-size:15px;
            background:#f8fafc;
        }

        textarea{
            resize:none;
            height:120px;
        }

        /* SUMMARY */

        .summary{

            background:white;
            padding:30px;
            border-radius:28px;
            height:fit-content;
            box-shadow:0 6px 18px rgba(0,0,0,0.05);
        }

        .summary h2{

            margin-bottom:25px;
            font-size:28px;
            color:#0f172a;
        }

        .summary-row{

            display:flex;
            justify-content:space-between;
            margin-bottom:18px;
            font-size:16px;
            color:#475569;
        }

        .summary-total{

            display:flex;
            justify-content:space-between;
            margin-top:25px;
            padding-top:20px;
            border-top:2px solid #eef2f7;
            font-size:24px;
            font-weight:700;
            color:#0f172a;
        }

        /* PAYMENT */

        .payment-method{

            margin-top:30px;
        }

        .payment-method h3{

            margin-bottom:16px;
            color:#0f172a;
        }

        .payment-option{

            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:14px;
            font-size:15px;
            color:#334155;
        }

        /* BUTTON */

        .place-order-btn{

            width:100%;
            margin-top:35px;
            padding:18px;
            border:none;
            border-radius:16px;
            background:#22c55e;
            color:white;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
        }

        .place-order-btn:hover{

            background:#16a34a;
        }

        /* MOBILE */

        @media(max-width:900px){

            .checkout-layout{

                grid-template-columns:1fr;
            }

            .checkout-header{

                flex-direction:column;
                gap:20px;
                align-items:flex-start;
            }
        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="checkout-header">

        <h1>Checkout 🛍️</h1>

        <a href="cart.html">

            <button class="back-btn">

                Back To Cart

            </button>

        </a>

    </div>

    <!-- LAYOUT -->

    <div class="checkout-layout">

        <!-- LEFT -->

        <div class="checkout-form">

            <h2>Customer Details</h2>

            <div class="form-group">

                <label>Full Name</label>

                <input type="text"
                id="customerName"
                placeholder="Enter your full name">

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input type="tel"
                id="customerPhone"
                placeholder="Enter phone number">

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input type="email"
                id="customerEmail"
                placeholder="Enter email address">

            </div>

            <div class="form-group">

                <label>Delivery Address</label>

                <textarea
                id="customerAddress"
                placeholder="Enter full address"></textarea>

            </div>

            <div class="form-group">

                <label>City</label>

                <input type="text"
                id="customerCity"
                placeholder="Enter city">

            </div>

            <div class="form-group">

                <label>Pincode</label>

                <input type="number"
                id="customerPincode"
                placeholder="Enter pincode">

            </div>

        </div>

        <!-- RIGHT -->

        <div class="summary">

            <h2>Order Summary</h2>

            <div class="summary-row">

                <span>Subtotal</span>

                <span id="subtotal">

                    ₹0

                </span>

            </div>

            <div class="summary-row">

                <span>Delivery Fee</span>

                <span id="delivery">

                    ₹50

                </span>

            </div>

            <div class="summary-total">

                <span>Total</span>

                <span id="total">

                    ₹0

                </span>

            </div>

            <!-- PAYMENT -->

            <div class="payment-method">

                <h3>Payment Method</h3>

                <div class="payment-option">

                    <input type="radio"
                    name="payment"
                    value="Cash On Delivery"
                    checked>

                    <span>Cash On Delivery</span>

                </div>

                <div class="payment-option">

                    <input type="radio"
                    name="payment"
                    value="UPI Payment">

                    <span>UPI Payment</span>

                </div>

                <div class="payment-option">

                    <input type="radio"
                    name="payment"
                    value="Credit / Debit Card">

                    <span>Credit / Debit Card</span>

                </div>

            </div>

            <!-- BUTTON -->

            <button class="place-order-btn"
            onclick="placeOrder()">

                Place Order

            </button>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

    function updateCheckoutTotal(){

        let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

        let subtotal = 0;

        cart.forEach(item => {

            subtotal +=
            item.price * item.quantity;

        });

        let delivery = 50;

        let total =
        subtotal + delivery;

        document.getElementById("subtotal")
        .innerText = "₹" + subtotal;

        document.getElementById("delivery")
        .innerText = "₹" + delivery;

        document.getElementById("total")
        .innerText = "₹" + total;
    }

    updateCheckoutTotal();

    function placeOrder(){

        let selectedPayment =
        document.querySelector(
        'input[name="payment"]:checked'
        ).value;

        let customer = {

            name:
            document.getElementById("customerName").value,

            phone:
            document.getElementById("customerPhone").value,

            email:
            document.getElementById("customerEmail").value,

            address:
            document.getElementById("customerAddress").value,

            city:
            document.getElementById("customerCity").value,

            pincode:
            document.getElementById("customerPincode").value,

            payment:
            selectedPayment
        };

        localStorage.setItem(
            "customer",
            JSON.stringify(customer)
        );

        window.location.href =
        "order-success.html";
    }

    </script>

</body>

</html>
