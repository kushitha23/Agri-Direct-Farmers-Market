<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Order History | Agri-Direct</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
padding:40px 8%;
}

a{
text-decoration:none;
color:inherit;
}

/* HEADER */

.history-header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
gap:20px;
}

.history-header h1{

font-size:42px;
color:#0f172a;
}

.home-btn{

padding:14px 24px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
}

/* ORDER LIST */

.orders{

display:flex;
flex-direction:column;
gap:30px;
}

.order-card{

background:white;
border-radius:30px;
padding:30px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
transition:0.3s;
}

.order-card:hover{

transform:translateY(-5px);
}

.top-row{

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.order-id{

font-size:24px;
font-weight:700;
color:#0f172a;
}

.status{

padding:10px 18px;
border-radius:30px;
font-size:14px;
font-weight:700;
background:#fef3c7;
color:#b45309;
}

/* DETAILS */

.details-grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:22px;
margin-bottom:30px;
}

.detail-box{

background:#f8fafc;
padding:18px;
border-radius:18px;
}

.detail-box h3{

margin-bottom:10px;
color:#0f172a;
font-size:18px;
}

.detail-box p{

color:#64748b;
line-height:28px;
font-size:15px;
}

/* BUTTONS */

.button-group{

display:flex;
gap:16px;
flex-wrap:wrap;
}

.btn{

padding:14px 24px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.track-btn{

background:#22c55e;
color:white;
}

.track-btn:hover{

background:#16a34a;
}

.reorder-btn{

background:#0f172a;
color:white;
}

.reorder-btn:hover{

background:#1e293b;
}

/* EMPTY */

.empty{

background:white;
padding:60px;
border-radius:30px;
text-align:center;
font-size:28px;
font-weight:700;
color:#64748b;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* MOBILE */

@media(max-width:800px){

.details-grid{

grid-template-columns:1fr;
}

.history-header{

flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="history-header">

<h1>Order History 📦</h1>

<a href="products.html">

<button class="home-btn">

Continue Shopping

</button>

</a>

</div>

<!-- ORDERS -->

<div class="orders"
id="ordersContainer">

</div>

<script>

// GET ORDERS

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

// GET CONTAINER

let container =
document.getElementById("ordersContainer");

// IF NO ORDERS

if(orders.length === 0){

container.innerHTML = `

<div class="empty">

No Orders Found 😔

</div>

`;

}

// SHOW ORDERS

else{

orders.reverse().forEach(order => {

let products =
order.products.map(p => p.name).join(", ");

container.innerHTML += `

<div class="order-card">

<div class="top-row">

<div class="order-id">

Order #${order.id}

</div>

<div class="status">

${order.status}

</div>

</div>

<div class="details-grid">

<div class="detail-box">

<h3>Products</h3>

<p>

${products}

</p>

</div>

<div class="detail-box">

<h3>Order Details</h3>

<p>

Amount: ₹${order.total}
<br>

Payment: ${order.payment}
<br>

Date: ${order.date}

</p>

</div>

</div>

<div class="button-group">

<a href="order-tracking.html">

<button class="btn track-btn">

Track Order

</button>

</a>

<a href="products.html">

<button class="btn reorder-btn">

Reorder

</button>

</a>

</div>

</div>

`;

});

}

</script>

</body>

</html>
