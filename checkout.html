<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Checkout | Agri-Direct</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Sora',sans-serif;
        }

        body{
            background:#f5f7fb;
            color:#081224;
        }

        /* NAVBAR */

        nav{

            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 8%;
            background:white;
            box-shadow:0 4px 10px rgba(0,0,0,0.05);
        }

        .logo{

            font-size:22px;
            font-weight:800;
            color:#05a834;
        }

        .logo i{
            margin-right:6px;
        }

        nav ul{

            display:flex;
            gap:24px;
            list-style:none;
        }

        nav ul li a{

            text-decoration:none;
            color:#334155;
            font-size:14px;
            font-weight:500;
        }

        nav ul li a:hover{
            color:#05a834;
        }

        /* PAGE */

        .checkout-container{

            width:85%;
            margin:50px auto;
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:30px;
        }

        /* FORM */

        .checkout-form{

            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 5px 14px rgba(0,0,0,0.05);
        }

        .checkout-form h1{

            margin-bottom:30px;
            font-size:36px;
        }

        .input-group{

            margin-bottom:20px;
        }

        .input-group label{

            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:600;
        }

        .input-group input,
        .input-group textarea{

            width:100%;
            padding:14px;
            border:1px solid #dbe4ee;
            border-radius:12px;
            font-size:14px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        /* ORDER SUMMARY */

        .summary{

            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 14px rgba(0,0,0,0.05);
            height:fit-content;
        }

        .summary h2{

            margin-bottom:25px;
        }

        .summary-item{

            display:flex;
            justify-content:space-between;
            margin-bottom:18px;
            color:#475569;
        }

        .total{

            margin-top:20px;
            padding-top:20px;
            border-top:1px solid #e2e8f0;
            font-size:22px;
            font-weight:700;
            color:#081224;
        }

        .pay-btn{

            width:100%;
            margin-top:30px;
            padding:15px;
            border:none;
            border-radius:14px;
            background:#05a834;
            color:white;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .pay-btn:hover{
            background:#04842a;
        }

        /* FOOTER */

        footer{

            background:#07152d;
            color:white;
            padding:45px 8% 20px;
            margin-top:60px;
        }

        .copyright{

            text-align:center;
            color:#94a3b8;
            font-size:12px;
        }

        /* MOBILE */

        @media(max-width:900px){

            .checkout-container{
                grid-template-columns:1fr;
            }

            nav ul{
                display:none;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <div class="logo">

            <i class="fa-solid fa-seedling"></i>

            Agri-Direct

        </div>

        <ul>

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li><a href="cart.html">Cart</a></li>

            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

    <!-- CHECKOUT -->

    <section class="checkout-container">

        <!-- FORM -->

        <div class="checkout-form">

            <h1>
                Checkout
            </h1>

            <form>

                <div class="input-group">

                    <label>Full Name</label>

                    <input type="text"
                    placeholder="Enter your full name">

                </div>

                <div class="input-group">

                    <label>Email Address</label>

                    <input type="email"
                    placeholder="Enter your email">

                </div>

                <div class="input-group">

                    <label>Phone Number</label>

                    <input type="text"
                    placeholder="Enter your mobile number">

                </div>

                <div class="input-group">

                    <label>Delivery Address</label>

                    <textarea placeholder="Enter your address"></textarea>

                </div>

            </form>

        </div>

        <!-- SUMMARY -->

        <div class="summary">

            <h2>
                Order Summary
            </h2>

            <div class="summary-item">

                <span>Organic Tomatoes</span>

                <span>₹80</span>

            </div>

            <div class="summary-item">

                <span>Sweet Mangoes</span>

                <span>₹120</span>

            </div>

            <div class="summary-item">

                <span>Delivery Charges</span>

                <span>₹40</span>

            </div>

            <div class="summary-item total">

                <span>Total</span>

                <span>₹240</span>

            </div>

            <button class="pay-btn">

                Proceed to Payment

            </button>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <div class="copyright">

            © 2026 Agri-Direct | Developed by Kushitha & Pradeep

        </div>

    </footer>

</body>

</html>
