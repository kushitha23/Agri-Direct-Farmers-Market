<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Add Product | Agri-Direct</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

       body{

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #22c55e,
        #16a34a,
        #0f766e
    );

    padding:30px 7%;
}


        a{
            text-decoration:none;
            color:inherit;
        }

        /* TOPBAR */

        .topbar{

            background:white;
            padding:22px 30px;
            border-radius:24px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:35px;
            box-shadow:0 8px 20px rgba(0,0,0,0.05);
        }

        .topbar h1{

            font-size:38px;
            color:#0f172a;
        }

        .back-btn{

            border:none;
            padding:14px 22px;
            border-radius:14px;
            background:#22c55e;
            color:white;
            font-weight:700;
            cursor:pointer;
        }

        /* FORM */

        .form-box{

            background:white;
            padding:40px;
            border-radius:30px;
            box-shadow:0 8px 20px rgba(0,0,0,0.05);
        }

        .form-title{

            margin-bottom:30px;
        }

        .form-title h2{

            font-size:34px;
            color:#0f172a;
            margin-bottom:10px;
        }

        .form-title p{

            color:#64748b;
        }

        .form-grid{

            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:25px;
        }

        .form-group{

            display:flex;
            flex-direction:column;
        }

        .form-group label{

            margin-bottom:10px;
            font-weight:600;
            color:#0f172a;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{

            padding:16px;
            border:none;
            background:#f1f5f9;
            border-radius:16px;
            outline:none;
            font-size:15px;
        }

        textarea{

            resize:none;
            height:140px;
        }

        .full-width{

            grid-column:1/3;
        }

        /* IMAGE UPLOAD */

        .image-upload{

            border:2px dashed #cbd5e1;
            border-radius:20px;
            padding:40px;
            text-align:center;
            background:#f8fafc;
            cursor:pointer;
        }

        .image-upload i{

            font-size:48px;
            color:#22c55e;
            margin-bottom:15px;
        }

        .image-upload p{

            color:#64748b;
        }

        /* BUTTONS */

        .button-group{

            display:flex;
            gap:20px;
            margin-top:35px;
            flex-wrap:wrap;
        }

        .btn{

            border:none;
            padding:16px 28px;
            border-radius:16px;
            color:white;
            font-weight:700;
            cursor:pointer;
            font-size:15px;
        }

        .save-btn{

            background:#22c55e;
        }

        .reset-btn{

            background:#ef4444;
        }

        /* MOBILE */

        @media(max-width:850px){

            .form-grid{

                grid-template-columns:1fr;
            }

            .full-width{

                grid-column:auto;
            }

            .topbar{

                flex-direction:column;
                gap:20px;
                align-items:flex-start;
            }
        }

    </style>

</head>



   <body>

    <div class="topbar">

        <h1>➕ Add Product</h1>

        <a href="farmer-dashboard.html">

            <button class="back-btn">

                Back Dashboard

            </button>

        </a>

    </div>

    <div class="form-box">

        <div class="form-title">

            <h2>Add New Product 🌾</h2>

            <p>
                Fill all details to add products to marketplace.
            </p>

        </div>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-grid">

                <div class="form-group">

                    <label>Product Name</label>

                    <input
                    type="text"
                    name="name"
                    required>

                </div>

                <div class="form-group">

                    <label>Category</label>

                    <select
                    name="category">

                        <option>Vegetables</option>
                        <option>Fruits</option>
                        <option>Dairy</option>
                        <option>Organic</option>
                        <option>Grains</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Price</label>

                    <input
                    type="number"
                    name="price"
                    required>

                </div>

                <div class="form-group">

                    <label>Stock Quantity</label>

                    <input
                    type="number"
                    name="stock"
                    required>

                </div>

               <div class="form-group full-width">

    <label>Upload Product Image</label>

    <input
    type="file"
    name="image"
    accept="image/*"
    capture="environment"
    required>

</div>
                <div class="form-group full-width">

                    <label>Description</label>

                    <textarea
                    name="description"
                    placeholder="Write product details..."></textarea>

                </div>

            </div>

            <div class="button-group">

                <button
                type="submit"
                class="btn save-btn">

                    Save Product

                </button>

                <button
                type="reset"
                class="btn reset-btn">

                    Reset

                </button>

            </div>

        </form>

    </div>

</body>

</html>
