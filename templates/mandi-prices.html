<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

🇮🇳 Andhra Pradesh Mandi Prices

</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#16a34a;

padding:40px;

}

.container{

max-width:1200px;

margin:auto;

background:white;

padding:40px;

border-radius:30px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:40px;

}

.header h1{

font-size:45px;

color:#15803d;

}

.back-btn{

padding:15px 30px;

background:#15803d;

color:white;

text-decoration:none;

border-radius:15px;

font-weight:600;

}

.back-btn:hover{

background:#166534;

}

.info{

background:#ecfdf5;

padding:20px;

border-radius:20px;

margin-bottom:35px;

font-size:20px;

color:#166534;

}

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:20px;

}

thead{

background:#15803d;

color:white;

}

th{

padding:22px;

text-align:left;

font-size:20px;

}

td{

padding:22px;

border-bottom:1px solid #e5e7eb;

font-size:18px;

}

tr:hover{

background:#f8fafc;

}

.price{

font-weight:700;

color:#15803d;

font-size:22px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>

🇮🇳 Andhra Pradesh Mandi Prices

</h1>

<a

href="/farmer-dashboard.html"

class="back-btn">

← Back Dashboard

</a>

</div>

<div class="info">

📊 Latest mandi prices across Andhra Pradesh.

</div>

<table>

<thead>

<tr>

<th>

Commodity

</th>

<th>

Mandi

</th>

<th>

District

</th>

<th>

Price

</th>

</tr>

</thead>

<tbody>

{% for mandi in mandi_prices %}

<tr>

<td>

{{ mandi.commodity }}

</td>

<td>

{{ mandi.market }}

</td>

<td>

{{ mandi.district }}

</td>

<td class="price">

{{ mandi.price }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
