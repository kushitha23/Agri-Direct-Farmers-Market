<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product | Agri-Direct</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#22c55e,
#16a34a,
#0f766e
);

padding:40px 8%;
}

/* HEADER */

.header{

background:white;
padding:25px 35px;
border-radius:25px;

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:35px;

box-shadow:
0 10px 25px rgba(0,0,0,0.08);
}

.header h1{

font-size:42px;
font-weight:800;
color:#0f172a;
}

.back-btn{

background:#22c55e;
color:white;

border:none;
padding:14px 24px;

border-radius:14px;

font-size:16px;
font-weight:600;

cursor:pointer;

transition:.3s;
}

.back-btn:hover{

transform:translateY(-2px);
}

/* FORM CARD */

.form-card{

max-width:850px;
margin:auto;

background:white;

padding:40px;

border-radius:30px;

box-shadow:
0 15px 30px rgba(0,0,0,0.08);
}

.form-title{

font-size:28px;
font-weight:700;
color:#0f172a;

margin-bottom:25px;
}

.form-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{

display:flex;
flex-direction:column;
}

.form-group label{

font-size:15px;
font-weight:600;
color:#334155;

margin-bottom:8px;
}

.form-group input{

padding:14px 16px;

border:1px solid #dbe2ea;
border-radius:14px;

font-size:15px;

transition:.3s;
}

.form-group input:focus{

outline:none;

border-color:#22c55e;

box-shadow:
0 0 0 4px rgba(34,197,94,0.15);
}

/* FULL WIDTH */

.full-width{

grid-column:1 / -1;
}

/* UPDATE BUTTON */

.update-btn{

width:100%;

padding:16px;

margin-top:25px;

background:#22c55e;

border:none;
border-radius:16px;

color:white;

font-size:18px;
font-weight:700;

cursor:pointer;

transition:.3s;
}

.update-btn:hover{

transform:translateY(-2px);

background:#16a34a;
}

/* PRODUCT PREVIEW */

.preview-box{

margin-top:30px;

background:#f8fafc;

padding:20px;

border-radius:20px;

border:1px solid #e2e8f0;
}

.preview-box h3{

margin-bottom:10px;

color:#0f172a;
}

.preview-box p{

color:#64748b;
}

/* MOBILE */

@media(max-width:768px){

.header{

flex-direction:column;
gap:20px;

text-align:center;
}

.header h1{

font-size:32px;
}

.form-grid{

grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="header">

<h1>✏️ Edit Product</h1>

<a href="/farmer-products.html">

<button class="back-btn">

← Back Products

</button>

</a>

</div>

<div class="form-card">

<h2 class="form-title">

Update Product Details

</h2>

<form
method="POST"
action="/update-product/{{ product.id }}"
>

<div class="form-grid">

<div class="form-group">

<label>Product Name</label>

<input
type="text"
name="name"
value="{{ product.name }}"
required>

</div>

<div class="form-group">

<label>Category</label>

<input
type="text"
name="category"
value="{{ product.category }}"
required>

</div>

<div class="form-group">

<label>Price (₹)</label>

<input
type="number"
name="price"
value="{{ product.price }}"
required>

</div>

<div class="form-group">

<label>Stock Quantity</label>

<input
type="number"
name="stock"
value="{{ product.stock }}"
required>

</div>

<div class="form-group full-width">

<label>Image URL</label>

<input
type="text"
name="image"
value="{{ product.image }}"

>

</div>

</div>

<button
type="submit"
class="update-btn">

✅ Update Product

</button>

</form>

<div class="preview-box">

<h3>Current Product</h3>

<p><strong>Name:</strong> {{ product.name }}</p>
<p><strong>Category:</strong> {{ product.category }}</p>
<p><strong>Price:</strong> ₹{{ product.price }}</p>
<p><strong>Stock:</strong> {{ product.stock }}</p>

</div>

</div>

</body>
</html>
