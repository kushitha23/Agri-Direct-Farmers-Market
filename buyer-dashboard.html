<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Buyer Dashboard | Agri-Direct</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Sora',sans-serif;
        }

        body{
            background:#f5f7fb;
            color:#081224;
        }

        nav{

            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 8%;
            background:white;
            box-shadow:0 4px 10px rgba(0,0,0,0.05);
        }

        .logo{

            font-size:22px;
            font-weight:800;
            color:#05a834;
        }

        .dashboard{

            width:85%;
            margin:40px auto;
        }

        .dashboard h1{

            font-size:40px;
            margin-bottom:10px;
        }

        .dashboard p{

            color:#64748b;
            margin-bottom:30px;
        }

        .stats{

            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:40px;
        }

        .stat-card{

            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 5px 14px rgba(0,0,0,0.05);
        }

        .stat-card h2{

            font-size:18px;
            margin-bottom:12px;
        }

        .stat-card .number{

            font-size:34px;
            font-weight:800;
            color:#05a834;
        }

        .orders{

            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 5px 14px rgba(0,0,0,0.05);
        }

        .orders h2{

            margin-bottom:20px;
        }

        table{

            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{

            padding:16px;
            text-align:left;
            border-bottom:1px solid #e2e8f0;
        }

        table th{

            background:#f8fafc;
        }

        .status{

            padding:8px 14px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .delivered{

            background:#dcfce7;
            color:#166534;
        }

        .pending{

            background:#fef3c7;
            color:#92400e;
        }

        footer{

            background:#07152d;
            color:white;
            padding:45px 8% 20px;
            margin-top:60px;
        }

        .copyright{

            text-align:center;
            color:#94a3b8;
            font-size:12px;
        }

        @media(max-width:900px){

            table{
                font-size:12px;
            }
        }

    </style>

</head>

<body>

    <nav>

        <div class="logo">

            <i class="fa-solid fa-seedling"></i>

            Agri-Direct

        </div>

    </nav>

    <section class="dashboard">

        <h1>
            Buyer Dashboard
        </h1>

        <p>
            Track your purchases and order history
        </p>

        <!-- STATS -->

        <div class="stats">

            <div class="stat-card">

                <h2>Total Orders</h2>

                <div class="number">12</div>

            </div>

            <div class="stat-card">

                <h2>Delivered</h2>

                <div class="number">9</div>

            </div>

            <div class="stat-card">

                <h2>Pending</h2>

                <div class="number">3</div>

            </div>

        </div>

        <!-- ORDERS -->

        <div class="orders">

            <h2>
                Recent Orders
            </h2>

            <table>

                <tr>

                    <th>Product</th>

                    <th>Quantity</th>

                    <th>Price</th>

                    <th>Status</th>

                </tr>

                <tr>

                    <td>Organic Tomatoes</td>

                    <td>2kg</td>

                    <td>₹80</td>

                    <td>

                        <span class="status delivered">

                            Delivered

                        </span>

                    </td>

                </tr>

                <tr>

                    <td>Sweet Mangoes</td>

                    <td>1 Dozen</td>

                    <td>₹120</td>

                    <td>

                        <span class="status pending">

                            Pending

                        </span>

                    </td>

                </tr>

            </table>

        </div>

    </section>

    <footer>

        <div class="copyright">

            © 2026 Agri-Direct | Developed by Kushitha & Pradeep

        </div>

    </footer>

</body>

</html>
