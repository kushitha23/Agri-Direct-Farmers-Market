<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Cart | Agri-Direct</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fb;
            padding:40px 8%;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        .cart-header{

            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:40px;
        }

        .cart-header h1{

            font-size:42px;
            color:#0f172a;
        }

        .continue-btn{

            padding:14px 24px;
            border:none;
            border-radius:14px;
            background:#22c55e;
            color:white;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
        }

        .cart-layout{

            display:grid;
            grid-template-columns:2fr 1fr;
            gap:30px;
        }

        .cart-items{

            display:flex;
            flex-direction:column;
            gap:25px;
        }

        .cart-card{

            background:white;
            border-radius:28px;
            padding:20px;
            display:flex;
            gap:20px;
            align-items:center;
            box-shadow:0 6px 18px rgba(0,0,0,0.05);
        }

        .cart-card img{

            width:150px;
            height:130px;
            object-fit:cover;
            border-radius:20px;
        }

        .cart-info{

            flex:1;
        }

        .cart-info h2{

            margin-bottom:10px;
            color:#0f172a;
        }

        .price{

            font-size:22px;
            font-weight:700;
            color:#16a34a;
            margin-bottom:16px;
        }

        .quantity-box{

            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:18px;
        }

        .qty-btn{

            width:36px;
            height:36px;
            border:none;
            border-radius:10px;
            background:#22c55e;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .qty{

            font-size:18px;
            font-weight:600;
        }

        .remove-btn{

            padding:10px 18px;
            border:none;
            border-radius:12px;
            background:#ef4444;
            color:white;
            font-size:14px;
            cursor:pointer;
        }

        /* SUMMARY */

        .summary{

            background:white;
            padding:30px;
            border-radius:28px;
            height:fit-content;
            box-shadow:0 6px 18px rgba(0,0,0,0.05);
        }

        .summary h2{

            margin-bottom:25px;
            font-size:30px;
            color:#0f172a;
        }

        .summary-row{

            display:flex;
            justify-content:space-between;
            margin-bottom:18px;
            font-size:16px;
            color:#475569;
        }

        .summary-total{

            display:flex;
            justify-content:space-between;
            margin-top:25px;
            padding-top:20px;
            border-top:2px solid #eef2f7;
            font-size:24px;
            font-weight:700;
            color:#0f172a;
        }

        .checkout-btn{

            width:100%;
            margin-top:30px;
            padding:16px;
            border:none;
            border-radius:16px;
            background:#22c55e;
            color:white;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
        }

        .empty-cart{

            background:white;
            padding:40px;
            border-radius:28px;
            text-align:center;
            font-size:22px;
            color:#64748b;
            box-shadow:0 6px 18px rgba(0,0,0,0.05);
        }

        @media(max-width:900px){

            .cart-layout{

                grid-template-columns:1fr;
            }

            .cart-card{

                flex-direction:column;
                text-align:center;
            }

            .cart-card img{

                width:100%;
                height:220px;
            }

            .quantity-box{

                justify-content:center;
            }
        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="cart-header">

        <h1>My Cart 🛒</h1>

        <a href="products.html">

            <button class="continue-btn">

                Continue Shopping

            </button>

        </a>

    </div>

    <!-- LAYOUT -->

    <div class="cart-layout">

        <!-- LEFT -->

        <div class="cart-items"
        id="cartItems">

        </div>

        <!-- RIGHT -->

        <div class="summary">

            <h2>Order Summary</h2>

            <div class="summary-row">

                <span>Subtotal</span>

                <span id="subtotal">

                    ₹0

                </span>

            </div>

            <div class="summary-row">

                <span>Delivery Fee</span>

                <span>

                    ₹50

                </span>

            </div>

            <div class="summary-total">

                <span>Total</span>

                <span id="total">

                    ₹0

                </span>

            </div>

            <a href="checkout.html">

                <button class="checkout-btn">

                    Proceed To Checkout

                </button>

            </a>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    const cartItems =
    document.getElementById("cartItems");

    function displayCart(){

        cartItems.innerHTML = "";

        if(cart.length === 0){

            cartItems.innerHTML = `

            <div class="empty-cart">

                Your cart is empty 🛒

            </div>

            `;

            updateCartTotal();

            return;
        }

        cart.forEach((item,index) => {

            cartItems.innerHTML += `

            <div class="cart-card">

                <img src="${item.image}">

                <div class="cart-info">

                    <h2>${item.name}</h2>

                    <div class="price">

                        ₹${item.price}

                    </div>

                    <div class="quantity-box">

                        <button class="qty-btn"
                        onclick="decreaseQuantity(${index})">

                            -

                        </button>

                        <div class="qty">

                            ${item.quantity}

                        </div>

                        <button class="qty-btn"
                        onclick="increaseQuantity(${index})">

                            +

                        </button>

                    </div>

                    <button class="remove-btn"
                    onclick="removeItem(${index})">

                        Remove

                    </button>

                </div>

            </div>

            `;
        });

        updateCartTotal();
    }

    function saveCart(){

        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );
    }

    function increaseQuantity(index){

        cart[index].quantity += 1;

        saveCart();

        displayCart();
    }

    function decreaseQuantity(index){

        if(cart[index].quantity > 1){

            cart[index].quantity -= 1;

            saveCart();

            displayCart();
        }
    }

    function removeItem(index){

        cart.splice(index,1);

        saveCart();

        displayCart();
    }

    function updateCartTotal(){

        let subtotal = 0;

        cart.forEach(item => {

            subtotal +=
            item.price * item.quantity;

        });

        let total =
        subtotal + 50;

        document.getElementById("subtotal")
        .innerText = "₹" + subtotal;

        document.getElementById("total")
        .innerText = "₹" + total;
    }

    displayCart();

    </script>

</body>

</html>
